name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Install shfmt
        env:
          SHFMT_VERSION: "3.11.0"
        run: |
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64" -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt
      - name: Lint
        run: make lint

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install bats (Linux)
        if: runner.os == 'Linux'
        env:
          BATS_VERSION: "1.12.0"
        run: |
          sudo mkdir -p /usr/local/lib
          curl -fsSL "https://github.com/bats-core/bats-core/archive/refs/tags/v${BATS_VERSION}.tar.gz" | sudo tar -xz -C /usr/local/lib
          sudo /usr/local/lib/bats-core-${BATS_VERSION}/install.sh /usr/local
      - name: Install bats (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core
      - name: Run tests
        run: make test
